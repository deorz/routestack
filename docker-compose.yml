services:
  app:
    build:
      context: .
      target: runtime
    environment:
      ROUTESTACK_SERVER_HOST: 0.0.0.0
      ROUTESTACK_DATABASE_URL: sqlite:////data/routestack.db
      ROUTESTACK_SECURITY_SECRET_KEY: change-me-in-production
      ROUTESTACK_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - app-data:/data
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      target: runtime
    command: ["python", "src/manage.py", "worker"]
    environment:
      ROUTESTACK_DATABASE_URL: sqlite:////data/routestack.db
      ROUTESTACK_SECURITY_SECRET_KEY: change-me-in-production
      ROUTESTACK_REDIS_URL: redis://redis:6379/0
    volumes:
      - app-data:/data
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  app-data:
